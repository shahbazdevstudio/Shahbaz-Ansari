<svg xmlns="http://www.w3.org/2000/svg" width="70" height="60" viewBox="0 0 70 60" fill="none">
  <defs>
    <linearGradient id="sigGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#2d7fff"/>
      <stop offset="100%" stop-color="#6062ff"/>
